<!DOCTYPE html>
<html>
<head>
<title>Yoga Enrollment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #e8f5e9, #f1f8e9);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 20px;
  width: 380px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  color: #2e8b57;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: gray;
  font-size: 14px;
  margin-bottom: 25px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #2e8b57;
  box-shadow: 0 0 8px rgba(46,139,87,0.3);
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(to right, #2e8b57, #3cb371);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

.footer-text {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<div class="container">

<h2>🧘‍♀️ Join Our Yoga Journey</h2>
<p class="subtitle">Yoga Se Sab Hoga ✨</p>

<form id="enrollForm">

<input type="text" id="name" name="Full Name" placeholder="Full Name" required>

<input type="email" id="email" name="Email" placeholder="Email Address" required>

<input type="tel" id="phone" name="Phone" placeholder="Mobile Number" pattern="[0-9]{10}" maxlength="10" required>

<select id="program" name="Program" required>
<option value="">Select Program</option>
<option>Beginner Yoga</option>
<option>Advance Yoga</option>
<option>Personal Training</option>
</select>

<button type="submit">Enroll Now</button>

</form>

<p class="footer-text">We respect your privacy 💚</p>

</div>
<script>


document.getElementById("enrollForm").addEventListener("submit", async function(e){

e.preventDefault();

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const phone = document.getElementById("phone").value;
const program = document.getElementById("program").value;

try{

const response = await fetch("http://127.0.0.1:5000/register",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email,
phone:phone,
program:program
})

});

alert("Enrollment Successful 🎉");

document.getElementById("enrollForm").reset();

}catch(error){

alert("Server connection error");

}

});

</script>

</body>
</html>
